<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">
    <title>Cadre Photo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, Arial, sans-serif;
        }

        #slideshow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        #slideshow img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #slideshow img.active { opacity: 1; }

        #zone-left, #zone-right {
            position: fixed;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }

        #zone-left { left: 0; }
        #zone-right { right: 0; }

        #start-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            color: white;
        }

        #start-screen.hidden { display: none; }
        #start-screen h1 { font-size: 28px; margin-bottom: 10px; }
        #start-screen p { color: #888; font-size: 16px; margin-bottom: 30px; }

        #config-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255,255,255,0.25);
            border: none;
            color: white;
            font-size: 26px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        #config-btn.visible { opacity: 1; }

        #settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 60px 25px 25px;
            overflow-y: auto;
            color: white;
        }

        #settings-panel.open { display: flex; }

        #settings-panel h2 {
            font-size: 22px;
            margin-bottom: 25px;
            text-align: center;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .setting-group label {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .setting-group input[type="range"] {
            width: 100%;
            accent-color: #007AFF;
        }

        .setting-group input[type="time"] {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 16px;
        }

        .setting-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-blue { background: #007AFF; color: white; }
        .btn-green { background: #34C759; color: white; }
        .btn-red { background: #FF3B30; color: white; }
        .btn-gray { background: #333; color: white; }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        #photo-count {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }

        #pause-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #pause-msg.visible { opacity: 1; }

        #loading-msg {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🖼️ Cadre Photo</h1>
        <p id="start-info">Chargement...</p>
        <button class="btn btn-blue" id="start-btn" onclick="openSettings()" style="display:none;">Configurer</button>
    </div>

    <div id="slideshow"></div>

    <div id="zone-left"></div>
    <div id="zone-right"></div>

    <button id="config-btn" onclick="openSettings()">⚙️</button>

    <div id="pause-msg">⏸ Hors plage horaire</div>

    <div id="settings-panel">
        <h2>⚙️ Réglages</h2>

        <div class="setting-group">
            <label>Photos</label>
            <div class="btn-row">
                <button class="btn btn-blue" onclick="addPhotos()">➕ Ajouter des photos</button>
                <button class="btn btn-red" onclick="clearPhotos()">🗑 Tout supprimer</button>
            </div>
            <p id="photo-count">Aucune photo</p>
            <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
        </div>

        <div class="setting-group">
            <label>Durée d'affichage : <span id="duration-val">10</span>s</label>
            <input type="range" id="duration" min="3" max="60" value="10"
                oninput="document.getElementById('duration-val').textContent=this.value;">
        </div>

        <div class="setting-group">
            <label>Fondu : <span id="fade-val">1.5</span>s</label>
            <input type="range" id="fade" min="0" max="3" step="0.5" value="1.5"
                oninput="document.getElementById('fade-val').textContent=this.value;">
        </div>

        <div class="setting-group">
            <label>Plage horaire active</label>
            <div class="setting-row">
                <input type="time" id="time-start" value="07:00">
                <span>→</span>
                <input type="time" id="time-end" value="22:00">
            </div>
        </div>

        <div class="btn-row" style="margin-top:30px;">
            <button class="btn btn-green" onclick="saveAndStart()" style="flex:1;">▶️ Lancer</button>
            <button class="btn btn-gray" onclick="closeSettings()">✕ Fermer</button>
        </div>
    </div>

<script>
    // ── Éléments DOM ──
    var slideshow = document.getElementById('slideshow');
    var startScreen = document.getElementById('start-screen');
    var startInfo = document.getElementById('start-info');
    var startBtn = document.getElementById('start-btn');
    var configBtn = document.getElementById('config-btn');
    var settingsPanel = document.getElementById('settings-panel');
    var fileInput = document.getElementById('file-input');
    var durationInput = document.getElementById('duration');
    var fadeInput = document.getElementById('fade');
    var timeStartInput = document.getElementById('time-start');
    var timeEndInput = document.getElementById('time-end');
    var photoCount = document.getElementById('photo-count');
    var pauseMsg = document.getElementById('pause-msg');
    var zoneLeft = document.getElementById('zone-left');
    var zoneRight = document.getElementById('zone-right');

    // ── Variables ──
    var photos = [];
    var shuffled = [];
    var currentIndex = 0;
    var slideshowTimer = null;
    var scheduleTimer = null;
    var configBtnTimer = null;
    var lastTap = 0;
    var DB_NAME = 'CadrePhotoDB';
    var DB_STORE = 'photos';
    var db = null;

    // ══════════════════════════════════
    //  INDEXED DB
    // ══════════════════════════════════
    function openDB(callback) {
        var request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = function(e) {
            var d = e.target.result;
            if (!d.objectStoreNames.contains(DB_STORE)) {
                d.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
            }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            if (callback) callback();
        };
        request.onerror = function() {
            console.error('Erreur IndexedDB');
            startInfo.textContent = 'Erreur de stockage';
            startBtn.style.display = 'inline-block';
        };
    }

    function savePhotosToDB(newPhotos, callback) {
        var tx = db.transaction(DB_STORE, 'readwrite');
        var store = tx.objectStore(DB_STORE);
        newPhotos.forEach(function(dataUrl) {
            store.add({ data: dataUrl });
        });
        tx.oncomplete = function() {
            if (callback) callback();
        };
    }

    function loadPhotosFromDB(callback) {
        var tx = db.transaction(DB_STORE, 'readonly');
        var store = tx.objectStore(DB_STORE);
        var request = store.getAll();
        request.onsuccess = function(e) {
            var results = e.target.result;
            photos = results.map(function(r) { return r.data; });
            if (callback) callback();
        };
    }

    function clearPhotosFromDB(callback) {
        var tx = db.transaction(DB_STORE, 'readwrite');
        var store = tx.objectStore(DB_STORE);
        store.clear();
        tx.oncomplete = function() {
            photos = [];
            if (callback) callback();
        };
    }

    // ══════════════════════════════════
    //  INITIALISATION
    // ══════════════════════════════════
    openDB(function() {
        // Charger réglages
        var savedSettings = localStorage.getItem('cadre_settings');
        if (savedSettings) {
            var s = JSON.parse(savedSettings);
            durationInput.value = s.duration || 10;
            fadeInput.value = s.fade || 1.5;
            timeStartInput.value = s.timeStart || '07:00';
            timeEndInput.value = s.timeEnd || '22:00';
            document.getElementById('duration-val').textContent = durationInput.value;
            document.getElementById('fade-val').textContent = fadeInput.value;
        }

        // Charger photos
        loadPhotosFromDB(function() {
            updatePhotoCount();
            if (photos.length > 0) {
                startInfo.textContent = photos.length + ' photo' + (photos.length > 1 ? 's' : '') + ' en mémoire';
                startBtn.textContent = '▶️ Lancer le diaporama';
                startBtn.style.display = 'inline-block';
                startBtn.onclick = function() { launchSlideshow(); };
            } else {
                startInfo.textContent = 'Aucune photo';
                startBtn.textContent = '⚙️ Configurer';
                startBtn.style.display = 'inline-block';
                startBtn.onclick = function() { openSettings(); };
            }
        });
    });

    // ══════════════════════════════════
    //  NAVIGATION PHOTOS
    // ══════════════════════════════════
    zoneLeft.addEventListener('click', function(e) {
        e.stopPropagation();
        if (settingsPanel.classList.contains('open')) return;
        if (shuffled.length <= 1) return;
        goTo(-1);
        resetTimer();
    });

    zoneRight.addEventListener('click', function(e) {
        e.stopPropagation();
        if (settingsPanel.classList.contains('open')) return;
        if (shuffled.length <= 1) return;
        goTo(1);
        resetTimer();
    });

    // Double-tap pour config
    zoneLeft.addEventListener('dblclick', showConfigBtn);
    zoneRight.addEventListener('dblclick', showConfigBtn);

    function showConfigBtn() {
        configBtn.classList.add('visible');
        clearTimeout(configBtnTimer);
        configBtnTimer = setTimeout(function() {
            configBtn.classList.remove('visible');
        }, 4000);
    }

    function goTo(direction) {
        var imgs = slideshow.querySelectorAll('img');
        if (imgs.length === 0) return;
        imgs[currentIndex].classList.remove('active');
        currentIndex += direction;
        if (currentIndex >= imgs.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = imgs.length - 1;
        imgs[currentIndex].classList.add('active');
    }

    function resetTimer() {
        if (slideshowTimer) {
            clearInterval(slideshowTimer);
            var duration = parseInt(durationInput.value) || 10;
            slideshowTimer = setInterval(function() { goTo(1); }, duration * 1000);
        }
    }

    // ══════════════════════════════════
    //  PARAMÈTRES
    // ══════════════════════════════════
    function openSettings() {
        settingsPanel.classList.add('open');
        configBtn.classList.remove('visible');
    }

    function closeSettings() {
        settingsPanel.classList.remove('open');
    }

    function addPhotos() {
        fileInput.click();
    }

    fileInput.addEventListener('change', function(e) {
        var files = e.target.files;
        if (!files.length) return;

        var newPhotos = [];
        var loaded = 0;
        photoCount.textContent = 'Chargement...';

        for (var i = 0; i < files.length; i++) {
            (function(file) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                    newPhotos.push(ev.target.result);
                    loaded++;
                    photoCount.textContent = 'Chargement... ' + loaded + '/' + files.length;
                    if (loaded === files.length) {
                        savePhotosToDB(newPhotos, function() {
                            photos = photos.concat(newPhotos);
                            updatePhotoCount();
                        });
                    }
                };
                reader.readAsDataURL(file);
            })(files[i]);
        }

        fileInput.value = '';
    });

    function clearPhotos() {
        if (confirm('Supprimer toutes les photos ?')) {
            clearPhotosFromDB(function() {
                updatePhotoCount();
            });
        }
    }

    function updatePhotoCount() {
        photoCount.textContent = photos.length + ' photo' + (photos.length > 1 ? 's' : '');
        if (photos.length === 0) photoCount.textContent = 'Aucune photo';
    }

    function saveSettings() {
        var settings = {
            duration: durationInput.value,
            fade: fadeInput.value,
            timeStart: timeStartInput.value,
            timeEnd: timeEndInput.value
        };
        localStorage.setItem('cadre_settings', JSON.stringify(settings));
    }

    function saveAndStart() {
        saveSettings();
        closeSettings();
        launchSlideshow();
    }

    // ══════════════════════════════════
    //  DIAPORAMA
    // ══════════════════════════════════
    function launchSlideshow() {
        if (photos.length === 0) {
            alert('Ajoutez des photos d\'abord !');
            return;
        }

        startScreen.classList.add('hidden');
        slideshow.innerHTML = '';

        // Appliquer le fondu
        var fadeVal = parseFloat(fadeInput.value) || 1.5;

        // Mélange aléatoire
        shuffled = photos.slice();
        for (var i = shuffled.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = shuffled[i];
            shuffled[i] = shuffled[j];
            shuffled[j] = tmp;
        }

        shuffled.forEach(function(src, i) {
            var img = document.createElement('img');
            img.src = src;
            img.style.transition = 'opacity ' + fadeVal + 's ease';
            if (i === 0) img.classList.add('active');
            slideshow.appendChild(img);
        });

        currentIndex = 0;
        startSlideshowTimer();
        startScheduleCheck();
    }

    function startSlideshowTimer() {
        stopSlideshow();
        if (shuffled.length <= 1) return;
        var duration = parseInt(durationInput.value) || 10;
        slideshowTimer = setInterval(function() {
            goTo(1);
        }, duration * 1000);
    }

    function stopSlideshow() {
        if (slideshowTimer) {
            clearInterval(slideshowTimer);
            slideshowTimer = null;
        }
    }

    // ══════════════════════════════════
    //  PLAGE HORAIRE
    // ══════════════════════════════════
    function isInSchedule() {
        var now = new Date();
        var current = now.getHours() * 60 + now.getMinutes();
        var sp = timeStartInput.value.split(':');
        var ep = timeEndInput.value.split(':');
        var start = parseInt(sp[0]) * 60 + parseInt(sp[1]);
        var end = parseInt(ep[0]) * 60 + parseInt(ep[1]);
        if (start <= end) return current >= start && current < end;
        return current >= start || current < end;
    }

    function startScheduleCheck() {
        if (scheduleTimer) clearInterval(scheduleTimer);
        function check() {
            if (photos.length === 0) return;
            if (isInSchedule()) {
                pauseMsg.classList.remove('visible');
                if (!slideshowTimer) startSlideshowTimer();
            } else {
                pauseMsg.classList.add('visible');
                stopSlideshow();
            }
        }
        check();
        scheduleTimer = setInterval(check, 30000);
    }
</script>
</body>
</html>
